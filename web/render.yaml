services:
  - type: web
    name: awroadside-fire-backend
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PUBLIC_BASE_URL
        sync: false
      - key: RUNTIME_ROOT
        value: /var/data/runtime
      - key: PAYPAL_ENV
        value: sandbox
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: AW_SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_2FA_CODE
        sync: false
      - key: ADMIN_TRUSTED_ZONES
        sync: false
    disk:
      name: awroadside-fire-runtime
      mountPath: /var/data
      sizeGB: 1
