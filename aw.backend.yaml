Services:web
  - type: backend/server.mjs
    name: awroadside-fire-backend
    runtime: node
    plan: starter
    rootDir: server.mjs
    buildFilter:package.json
      paths:
        - backend/storage/index.mjs
        - backend/**/*.mjs
        - backend/**/*.js
        - backend/**/*.json
        - web/**/*
        - scripts/**/*.mjs
        - scripts/**/*.js
        - package.json
        - src/**
        - aw.backend.yaml
        - render.yaml
        - .node-version
        - app/runtime/**/*
      ignoredPaths:
        - 
        - dist-app-variant/**
        - 
        - out/**
        - wordpress/**
        
        - "**/*.md"
        - "**/*.txt"
        - "**/*.zip"
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://awroadside-fire-backend.onrender.com
      - key: INTERNAL_DB_URL
        sync: false
      - key: AW_DB_MODE
        value: file-runtime
      - key: AW_DB_STRICT
        value: "false"
      - key: RUNTIME_ROOT
        value: /var/data/runtime
      - key: PAYPAL_ENV
        value: sandbox
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false
      - key: db_id
        sync: false
      - key: mapbox_access_token
        sync: false
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_SECURE
        sync: false
      - key: MAIL_REQUIRE_STARTTLS
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_REPLY_TO
        sync: false
      - key: AW_SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_2FA_CODE
        sync: false
      - key: ADMIN_TRUSTED_ZONES
        sync: false
    disk:
      name: awroadside-fire-runtime
      mountPath: /var/data
      sizeGB: 1
