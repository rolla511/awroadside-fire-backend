services:
  - type: web
    name: awroadside-fire-backend
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /index.mjs/health
    envVars:
      - key: NODE_VERSION
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://awroadside-fire-backend.onrender.com
      - key: AW_DB_NAME
        sync: false
      - key: internal_db_url
        sync: false
      - key: Usdb_entry
        sync: false
      - key: config
        sync: false
      - key: USDB_ENTRY
        sync: false
      - key: USDB_CONFIG_HANDLE
        sync: false
      - key: RUNTIME_ROOT
        value: app/runtime
      - key: PAYPAL_ENV
        value: live
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY_1
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false
      - key: db_id
        sync: false
      - key: mapbox_access_token
        sync: false
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_SECURE
        sync: false
      - key: MAIL_REQUIRE_STARTTLS
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_REPLY_TO
        sync: false
      - key: AW_SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_2FA_CODE
        sync: false
      - key: ADMIN_TRUSTED_ZONES
        sync: false
